name: Release

# Pushing a tag like v1.0.0 builds installable binaries for every platform
# and publishes them as a GitHub Release. Android/iOS build on GitHub's
# runners exactly like CI; iOS ships unsigned (no Apple Developer signing in
# CI) and is included for sideloaders — see the install notes attached to
# each release.
#
# workflow_dispatch runs the same builds as a DRY RUN (artifacts only, no
# release is published) so packaging changes can be verified on real
# runners before tagging.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.9"

# Build jobs only read the repo; only the publish job may write (create the
# release). checkout persists its token by default, so keeping the builds
# read-only means no build-time code (Gradle/Xcode/pub plugins) can mutate
# the repository.
permissions:
  contents: read

jobs:
  build-android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    env:
      # Secrets can't be referenced in step `if:` directly; surface presence
      # as an env flag. Without a keystore no Android artifact is published
      # at all: a debug-signed AAB is rejected by Play, and a debug-signed
      # APK is worse than nothing — fresh runners generate a new debug key
      # per run, so every release would carry a different certificate and
      # Android would refuse in-place updates (users would have to uninstall
      # and lose data).
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Decode release keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 -d \
            > "$RUNNER_TEMP/upload-keystore.jks"
      - run: flutter pub get
      - name: Build APK + Play-Store bundle
        if: env.HAS_KEYSTORE == 'true'
        # Signing values reach Gradle as environment variables (read by
        # android/app/build.gradle.kts), never via a key.properties file —
        # Java's Properties.load would reinterpret backslashes / leading
        # whitespace in generated passwords, silently corrupting them.
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release
          flutter build appbundle --release
      - name: Stage artifacts
        if: env.HAS_KEYSTORE == 'true'
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/markdown-studio-android.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
            "dist/markdown-studio-android.aab"
      - name: Android skipped (no keystore)
        if: env.HAS_KEYSTORE != 'true'
        run: >
          echo "::notice::ANDROID_KEYSTORE_* secrets not configured — Android
          artifacts skipped (a per-run debug key would change the signing
          certificate every release and break in-place updates)."
      - uses: actions/upload-artifact@v4
        if: env.HAS_KEYSTORE == 'true'
        with:
          name: release-android
          path: dist/

  build-linux:
    name: Linux (x64)
    # Pinned to the oldest supported LTS image (not ubuntu-latest): the
    # binary links against the build machine's glibc/libstdc++, so building
    # on the oldest baseline keeps the release runnable on users' LTS
    # desktops.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Compute package version
        # Dispatch dry-runs come from branches (no semver): package as 0.0.0.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="0.0.0"
          fi
          echo "VER=$VER" >> "$GITHUB_ENV"
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Stage portable tarball
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf \
            "dist/markdown-studio-linux-x64-portable.tar.gz" .
      - name: Build .deb package
        run: |
          PKG="pkg/markdown-studio_${VER}_amd64"
          mkdir -p "$PKG/DEBIAN" "$PKG/opt/markdown-studio" "$PKG/usr/bin" \
            "$PKG/usr/share/applications" \
            "$PKG/usr/share/icons/hicolor/192x192/apps"
          cp -r build/linux/x64/release/bundle/. "$PKG/opt/markdown-studio/"
          ln -s /opt/markdown-studio/markdown_studio "$PKG/usr/bin/markdown-studio"
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \
            "$PKG/usr/share/icons/hicolor/192x192/apps/markdown-studio.png"
          cat > "$PKG/usr/share/applications/markdown-studio.desktop" << EOF
          [Desktop Entry]
          Name=Markdown Studio
          Comment=Markdown viewer, WYSIWYG editor and PDF/print studio
          Exec=/opt/markdown-studio/markdown_studio %F
          Icon=markdown-studio
          Terminal=false
          Type=Application
          Categories=Office;TextEditor;
          MimeType=text/markdown;text/x-markdown;
          EOF
          # The heredoc above carries the step's YAML indent; strip it so
          # the .desktop file is valid.
          sed -i 's/^          //' "$PKG/usr/share/applications/markdown-studio.desktop"
          cat > "$PKG/DEBIAN/control" << EOF
          Package: markdown-studio
          Version: ${VER}
          Section: editors
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libc6 (>= 2.35), libstdc++6 (>= 12)
          Maintainer: Markdown Studio <noreply@github.com>
          Homepage: https://github.com/TheSaltyKorean/md
          Description: Markdown viewer, WYSIWYG editor and PDF/print studio
           Cross-platform Markdown editor with a Notion-style WYSIWYG mode,
           split source/preview, and themeable print/PDF export including
           court-filing (legal) formatting.
          EOF
          sed -i 's/^          //' "$PKG/DEBIAN/control"
          dpkg-deb --build --root-owner-group "$PKG" \
            "dist/markdown-studio-linux-amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute package version
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $env:GITHUB_REF_NAME.TrimStart('v')
          } else { '0.0.0' }
          "VER=$ver" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Stage portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "dist/markdown-studio-windows-x64-portable.zip"
      - name: Build installer (Inno Setup)
        shell: pwsh
        # Inno Setup 6 is preinstalled on windows-latest runners.
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$env:VER `
            /DSourceDir="$PWD\build\windows\x64\runner\Release" `
            /DOutputDir="$PWD\dist" `
            tool\windows_installer.iss
          Rename-Item "dist\markdown-studio-setup.exe" `
            "markdown-studio-windows-x64-setup.exe"
      - name: Build MSI (WiX)
        shell: pwsh
        # WiX is pinned to 5.0.2: v6+ gates the toolset behind the OSMF EULA.
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
          # Render the PolyForm license to the RTF the MSI dialog requires.
          $text = Get-Content LICENSE.md -Raw
          $esc = $text -replace '\\','\\' -replace '\{','\{' -replace '\}','\}'
          $esc = $esc -replace "`r`n","`n" -replace "`n",'\par '
          Set-Content -Path license.rtf -Encoding Ascii -Value `
            "{\rtf1\ansi\deff0{\fonttbl{\f0 Segoe UI;}}\fs18 $esc}"
          wix build tool/windows_installer.wxs `
            -ext WixToolset.UI.wixext `
            -arch x64 `
            -d Version=$env:VER `
            -d SourceDir="$PWD\build\windows\x64\runner\Release" `
            -d LicenseRtf="$PWD\license.rtf" `
            -d IconPath="$PWD\windows\runner\resources\app_icon.ico" `
            -pdbtype none `
            -o "dist/markdown-studio-windows-x64.msi"
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/

  build-apple:
    name: macOS + iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - run: flutter build ios --release --no-codesign
      - name: Stage artifacts
        run: |
          mkdir -p dist
          # macOS: zip the .app bundle (ditto preserves bundle metadata).
          APP="$(ls -d build/macos/Build/Products/Release/*.app | head -1)"
          ditto -c -k --keepParent "$APP" \
            "dist/markdown-studio-macos.zip"
          # iOS: package the unsigned Runner.app as an .ipa-style zip for
          # sideloading tools (AltStore/Sideloadly re-sign it on install).
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -qry "dist/markdown-studio-ios-unsigned.ipa" Payload
      - uses: actions/upload-artifact@v4
        with:
          name: release-apple
          path: dist/

  publish:
    name: Publish GitHub Release
    # Dry runs (workflow_dispatch) stop here: artifacts are built and
    # uploaded for inspection, but no release is created — including a
    # dispatch aimed at a tag ref, hence the event check.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-linux, build-windows, build-apple]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist
      - name: Create release with install notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md << 'EOF'
          ## Install

          **Windows** — pick one: `markdown-studio-windows-x64.msi`
          (standard Windows Installer: Program Files, Start Menu,
          Add/Remove Programs, in-place upgrades; silent-deployable with
          `msiexec /i … /qn`), or `markdown-studio-windows-x64-setup.exe`
          (same result via Inno Setup, plus an optional desktop icon), or
          the portable `markdown-studio-windows-x64-portable.zip` (extract
          and run `markdown_studio.exe`). SmartScreen may warn on unsigned
          builds: *More info → Run anyway*.

          **Linux** — easiest (Debian/Ubuntu):
          `sudo apt install ./markdown-studio-linux-amd64.deb` — desktop
          entry, `markdown-studio` on PATH, and `.md` file association
          included. Portable alternative for any distro:
          ```
          mkdir -p ~/.local/opt/markdown-studio
          tar -xzf markdown-studio-linux-x64-portable.tar.gz -C ~/.local/opt/markdown-studio
          ~/.local/opt/markdown-studio/markdown_studio
          ```
          Requires GTK 3. Built on Ubuntu 22.04, so it runs on any distro
          with glibc 2.35+ (2022 or newer).

          **Android** — download the `.apk` on the device and open it (allow
          "install unknown apps" for your browser/file manager when prompted).
          The `.aab` is the Play-Store upload artifact, not for direct
          install. Android files appear only on **signed** releases (the
          repo's keystore secrets configured); unsigned Android builds are
          never published because their per-build certificate would break
          in-place updates between releases.

          **macOS** — download `markdown-studio-macos.zip`, unzip, drag the app to
          Applications. The build is unsigned: on first launch right-click →
          *Open*, or clear quarantine with
          `xattr -dr com.apple.quarantine "/Applications/markdown_studio.app"`.

          **iOS** — `markdown-studio-ios-unsigned.ipa` is **unsigned** (no App Store yet):
          install it with a sideloading tool that re-signs with your Apple ID
          (AltStore, Sideloadly) or via Xcode with your own provisioning.
          EOF
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "Markdown Studio $GITHUB_REF_NAME" \
            --notes-file notes.md
