name: markdown_studio
description: "A cross-platform Markdown viewer and WYSIWYG editor built with Flutter and Material Design."
publish_to: "none"

# App version. Format: <semver>+<buildNumber>.
# The build number must be incremented for every store submission.
version: 1.0.11+12

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Localization delegates (required by AppFlowy Editor).
  flutter_localizations:
    sdk: flutter

  # Material Design icons + adaptive widgets are part of the Flutter SDK.

  # --- Block-style WYSIWYG editor (Notion-like) with Markdown round-tripping ---
  # Provides markdownToDocument() / documentToMarkdown() and the AppFlowyEditor widget.
  appflowy_editor: ^6.2.0

  # --- Rendering for the split-view live preview & read-only preview ---
  # The original `flutter_markdown` was discontinued by Google in 2025;
  # `flutter_markdown_plus` is the maintained successor with the same API.
  flutter_markdown_plus: ^1.0.6

  # Dart Markdown parser (markdown -> HTML), used for the print/PDF pipeline.
  markdown: ^7.3.0

  # --- Printing & PDF export (all platforms) ---
  printing: ^5.13.0
  pdf: ^3.11.1

  # --- File open/save across desktop & mobile ---
  # Pinned to 10.x: AppFlowy 6.2.0 still calls the file_picker 10 API
  # (`FilePicker.platform`), so file_picker 11 fails to compile AppFlowy.
  # Revisit once AppFlowy migrates to the 11 API.
  file_picker: ^10.3.10

  # --- Persisted settings (theme mode, last file, etc.) ---
  shared_preferences: ^2.3.3

  # --- Simple state management ---
  provider: ^6.1.2

  # Path manipulation (basename, extension, join).
  path: ^1.9.0

  # App-owned storage dir (so picked logos survive in the macOS sandbox).
  path_provider: ^2.1.4

  # Open links from rendered Markdown in the system browser.
  url_launcher: ^6.3.1

  # App + build metadata at runtime (About dialog shows the real version).
  package_info_plus: ^8.3.0

  # Watch the open file for external changes (git pull, sync, other editors).
  watcher: ^1.1.0

  # Drag-and-drop files into the app (desktop).
  desktop_drop: ^0.7.1

  # Focus/raise the existing window when a file is opened into it (desktop).
  window_manager: ^0.4.3

# AppFlowy Editor depends on intl ^0.19.0, but the Flutter SDK's
# flutter_localizations pins intl to 0.20.2. AppFlowy works fine with 0.20.x, so
# we override the constraint to let both resolve together.
dependency_overrides:
  intl: 0.20.2
  # path_provider_foundation 2.6.0 reintroduced a native-assets impl reported to
  # break macOS App Store uploads / crash iOS; pin to the method-channel line
  # until it's resolved upstream.
  path_provider_foundation: ">=2.4.1 <2.6.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Test-only: synthesize a tall image to exercise the PDF image height cap.
  image: ^4.0.0
  # Microsoft Store packaging (dart run msix:create --store); identity values
  # are overridden in CI from the MSIX_* secrets — see docs/RELEASING.md.
  msix: ^3.16.9
  # App-icon generation (dart run flutter_launcher_icons). Build-time only —
  # the source PNGs in assets/icon are not bundled into the app.
  flutter_launcher_icons: ^0.14.4

# App launcher icons. Regenerate after changing assets/icon/* with:
#   dart run flutter_launcher_icons
# Android uses an adaptive icon (gradient background layer + white mark
# foreground layer); every other platform masks the full-bleed icon.png.
# After regenerating, redo two things the tool gets wrong: rebuild the
# multi-size Windows .ico (see the windows: note below), and reset the iOS
# ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS build settings
# back to YES in ios/Runner.xcodeproj/project.pbxproj (the tool mis-sets them
# to "AppIcon"; the icon is selected via ASSETCATALOG_COMPILER_APPICON_NAME).
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  # Windows is generated OUTSIDE this tool: flutter_launcher_icons emits a
  # single-size .ico, but Windows title bars / Explorer / context menus / the
  # MSI installer request 16-48px directly and would downscale a lone 256px
  # image. windows/runner/resources/app_icon.ico is instead a multi-size .ico
  # built from assets/icon/icon.png with:
  #   magick assets/icon/icon.png -background none \
  #     -define icon:auto-resize=256,128,64,48,32,24,16 \
  #     windows/runner/resources/app_icon.ico
  windows:
    generate: false

flutter:
  uses-material-design: true

# Microsoft Store MSIX packaging (dart run msix:create --store). The identity
# placeholders below are overridden in the release workflow with the real
# Partner Center values (MSIX_IDENTITY_NAME / MSIX_PUBLISHER_DISPLAY_NAME
# secrets) — see docs/RELEASING.md for the one-time Partner Center setup.
msix_config:
  display_name: Markdown Studio
  identity_name: com.markdownstudio.markdownstudio
  publisher_display_name: Markdown Studio
  logo_path: android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
  store: true
